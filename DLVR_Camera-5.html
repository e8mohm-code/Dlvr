<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DLVR</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#00ffb3;
  --b:#00cfff;
  --dark:#080c10;
  --card:#0e1318;
  --border:#1a2530;
  --text:#e8f4f8;
  --muted:#4a6070;
  --red:#ff3d57;
  --warn:#ffb300;
}
html,body{
  height:100%;
  font-family:'Tajawal',sans-serif;
  background:var(--dark);
  color:var(--text);
  overflow:hidden;
  user-select:none;
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   LAYOUT
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  max-width:480px;
  margin:0 auto;
  position:relative;
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   HEADER
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.header{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px 12px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  position:relative;
  z-index:20;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.brand-icon{
  width:36px;height:36px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--g),var(--b));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#000;
  letter-spacing:-0.5px;
  transition:transform .12s;
  position:relative;
  overflow:hidden;
}
.brand-icon::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25),transparent);
}
.brand-icon.tap{transform:scale(.82);}

.brand-name{font-size:18px;font-weight:900;color:var(--text);letter-spacing:3px;}
.brand-sub{font-size:10px;color:var(--muted);margin-top:1px;font-weight:400;}

/* Secret tap dots */
.tap-row{display:flex;gap:3px;margin-top:3px;}
.tdot{
  width:4px;height:4px;border-radius:50%;
  background:var(--border);
  transition:background .15s;
}
.tdot.on{background:var(--g);}

.today-box{
  background:var(--border);
  border-radius:12px;
  padding:6px 14px;
  text-align:center;
}
.today-n{font-size:20px;font-weight:900;color:var(--g);line-height:1;}
.today-l{font-size:9px;color:var(--muted);font-weight:500;letter-spacing:1px;}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   CAMERA ZONE
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.cam-zone{
  flex:1;
  position:relative;
  background:#000;
  overflow:hidden;
}

video#vid{
  position:absolute;
  inset:0;
  width:100%;height:100%;
  object-fit:cover;
  /* NO transform \u2014 camera NOT mirrored */
  display:none;
}
