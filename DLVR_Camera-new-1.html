<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DLVR</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --org:#00C853;--org2:#69F0AE;--org-dim:rgba(0,200,83,.15);
  --dark:#0A0A0A;--card:#111111;--border:#222222;
  --text:#F0F0F0;--muted:#555555;--red:#ff3d57;--warn:#ffb300;
}
html,body{height:100%;font-family:'Tajawal',sans-serif;background:var(--dark);color:var(--text);overflow:hidden;user-select:none;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;}

/* HEADER */
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:var(--card);border-bottom:2px solid var(--org);z-index:20;}
.brand{display:flex;align-items:center;gap:9px;cursor:pointer;}
.logo-svg{width:34px;height:34px;flex-shrink:0;}
.brand-name{font-size:18px;font-weight:900;color:var(--text);letter-spacing:3px;line-height:1;}
.tap-row{display:flex;gap:3px;margin-top:2px;}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--border);transition:background .15s;}
.tdot.on{background:var(--org);}
.header-right{display:flex;align-items:center;gap:8px;}
.lang-btn{background:var(--org-dim);border:1px solid var(--org);border-radius:8px;color:var(--org);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;}
.today-box{background:var(--org-dim);border:1px solid var(--org);border-radius:12px;padding:5px 12px;text-align:center;min-width:100px;}
.today-n{font-size:18px;font-weight:900;color:var(--org);line-height:1;}
.today-label{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-top:1px;}
.today-branch{font-size:9px;color:var(--org);font-weight:700;margin-top:1px;opacity:.85;}
.today-date{font-size:8px;color:var(--muted);font-weight:500;margin-top:1px;}

/* CAM */
.cam-zone{flex:1;position:relative;background:#000;overflow:hidden;min-height:0;}
video#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.75)100%);pointer-events:none;z-index:2;}
.status-bar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;justify-content:center;padding:6px 12px;}
.conn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;background:rgba(0,0,0,.55);border-radius:20px;padding:4px 12px;backdrop-filter:blur(6px);}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;}
.conn.ok .conn-dot{background:var(--org);box-shadow:0 0 5px var(--org);}
.conn-txt{color:var(--muted);}
.conn.ok .conn-txt{color:var(--org);}
.scan-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:78%;aspect-ratio:1.6/1;z-index:3;pointer-events:none;}
.sc{position:absolute;width:24px;height:24px;border-color:var(--org);border-style:solid;transition:border-color .3s;}
.sc.tl{top:0;right:0;border-width:3px 0 0 3px;border-radius:3px 0 0 0;}
.sc.tr{top:0;left:0;border-width:3px 3px 0 0;border-radius:0 3px 0 0;}
.sc.bl{bottom:0;right:0;border-width:0 0 3px 3px;border-radius:0 0 0 3px;}
.sc.br{bottom:0;left:0;border-width:0 3px 3px 0;border-radius:0 0 3px 0;}
.scan-box.captured .sc{border-color:#fff;}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--org),transparent);top:0;opacity:0;}
.scanning .scan-line{animation:scanMove 2s ease-in-out infinite;opacity:1;}
@keyframes scanMove{0%{top:4px;}50%{top:calc(100% - 4px);}100%{top:4px;}}
.box-label{position:absolute;bottom:-26px;right:50%;transform:translateX(50%);font-size:11px;font-weight:700;color:var(--org);letter-spacing:1.5px;opacity:.9;white-space:nowrap;}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:10;transition:opacity .06s;}
.flash.go{opacity:1;transition:none;}
.no-cam{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--dark);z-index:5;}
.no-cam-icon{width:60px;height:60px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);}
.no-cam p{font-size:13px;color:var(--muted);font-weight:500;}
.start-btn{padding:11px 28px;border-radius:50px;border:2px solid var(--org);background:transparent;color:var(--org);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

/* BOTTOM */
.bottom{flex-shrink:0;background:var(--card);border-top:2px solid var(--org);padding:10px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:20;}
.shutter-ring{width:72px;height:72px;border-radius:50%;border:2px solid rgba(0,200,83,.3);display:flex;align-items:center;justify-content:center;}
.shutter{width:60px;height:60px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--org),var(--org2));cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s,box-shadow .2s;box-shadow:0 4px 20px rgba(0,200,83,.4);position:relative;overflow:hidden;}
.shutter::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.25),transparent);border-radius:50%;}
.shutter:active{transform:scale(.9);}
.shutter:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}
.shutter svg{position:relative;z-index:1;}
canvas{display:none;}

/* ADMIN */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;backdrop-filter:blur(10px);align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.sheet{width:100%;max-width:480px;background:var(--card);border-top:2px solid var(--org);border-radius:24px 24px 0 0;padding:18px 18px 28px;animation:up .3s cubic-bezier(.22,1,.36,1);max-height:90dvh;overflow-y:auto;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.sheet-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.sheet-title{font-size:15px;font-weight:700;}
.sheet-badge{font-size:10px;font-weight:700;background:var(--org-dim);color:var(--org);border-radius:20px;padding:2px 9px;}
.sheet-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.pin-wrap{margin-bottom:4px;}
.pin-in{width:100%;background:var(--dark);border:1.5px solid var(--border);border-radius:12px;padding:12px;font-family:'Tajawal',sans-serif;font-size:20px;font-weight:700;color:var(--text);outline:none;text-align:center;letter-spacing:8px;transition:border-color .2s;}
.pin-in:focus{border-color:var(--org);}
.pin-err{font-size:12px;color:var(--red);text-align:center;padding:6px 0;display:none;}
.settings{display:none;}
.field-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;letter-spacing:.5px;}
.url-row{display:flex;gap:8px;margin-bottom:6px;}
.url-in{flex:1;background:var(--dark);border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;font-family:'Tajawal',sans-serif;font-size:12px;color:var(--text);outline:none;direction:ltr;text-align:left;transition:border-color .2s;}
.url-in:focus{border-color:var(--org);}
.url-in::placeholder{color:var(--muted);}
.text-in{width:100%;background:var(--dark);border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none;text-align:right;transition:border-color .2s;margin-bottom:6px;}
.text-in:focus{border-color:var(--org);}
.text-in::placeholder{color:var(--muted);}
.save-btn{padding:10px 14px;border-radius:12px;border:none;background:var(--org);color:#000;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.field-hint{font-size:10px;color:var(--muted);margin-bottom:12px;}
.close-btn{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;}

/* ANALYZING */
.analyzing{display:none;position:fixed;inset:0;background:rgba(10,10,10,.92);z-index:60;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(12px);}
.analyzing.on{display:flex;}
.spin-ring{width:52px;height:52px;border-radius:50%;border:3px solid rgba(0,200,83,.15);border-top-color:var(--org);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.an-t{font-size:15px;font-weight:700;color:var(--org);}
.an-s{font-size:11px;color:var(--muted);}

/* RESULT */
.result-overlay{display:none;position:fixed;inset:0;z-index:55;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.result-overlay.on{display:flex;}
.result-sheet{width:100%;max-width:480px;background:var(--card);border-top:2px solid var(--org);border-radius:24px 24px 0 0;padding:16px 18px 28px;animation:up .3s cubic-bezier(.22,1,.36,1);}
.r-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 12px;}
.r-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.r-title{font-size:14px;font-weight:700;color:var(--org);}
.r-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.r-badge.ok{background:var(--org-dim);color:var(--org);}
.r-badge.err{background:rgba(255,61,87,.1);color:var(--red);}
.r-rows{display:flex;flex-direction:column;gap:9px;}
.r-row{display:flex;gap:10px;align-items:flex-start;}
.r-key{font-size:11px;color:var(--muted);min-width:75px;padding-top:2px;font-weight:600;}
.r-val{font-size:13px;color:var(--text);font-weight:500;flex:1;line-height:1.5;}
.r-val.big{font-size:17px;font-weight:900;color:var(--org);}
.r-val.warn{color:var(--warn);}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(60px);padding:9px 20px;border-radius:50px;font-size:13px;font-weight:700;z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;font-family:'Tajawal',sans-serif;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--org);color:#000;}
.toast.bad{background:var(--red);color:#fff;}
.toast.info{background:#1a1a1a;color:var(--text);border:1px solid var(--border);}

/* SUCCESS */
.success-overlay{display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);flex-direction:column;gap:14px;}
.success-overlay.on{display:flex;}
.success-circle{width:100px;height:100px;border-radius:50%;background:var(--org-dim);border:3px solid var(--org);display:flex;align-items:center;justify-content:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-check{animation:drawCheck .4s .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes drawCheck{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.success-txt{font-size:17px;font-weight:700;color:var(--text);animation:fadeUp .4s .3s both;}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="brand" id="brand" onclick="onBrandTap()">
      <svg class="logo-svg" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="38" height="38" rx="9" fill="#00C853"/>
        <path d="M24 5L10 20.5H19L13 33L28 17.5H19L24 5Z" fill="#0d0d0d"/>
      </svg>
      <div>
        <div class="brand-name">DLVR</div>
        <div class="tap-row">
          <div class="tdot" id="t0"></div><div class="tdot" id="t1"></div>
          <div class="tdot" id="t2"></div><div class="tdot" id="t3"></div>
          <div class="tdot" id="t4"></div>
        </div>
      </div>
    </div>
    <div class="header-right">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
      <div class="today-box">
        <div class="today-n" id="cnt">0</div>
        <div class="today-label" id="lbl_today">طلبات اليوم</div>
        <div class="today-branch" id="todayBranch"></div>
        <div class="today-date" id="todayDate"></div>
      </div>
    </div>
  </div>

  <div class="cam-zone" id="camZone">
    <div class="status-bar">
      <div class="conn" id="conn">
        <div class="conn-dot"></div>
        <span class="conn-txt" id="connTxt">غير متصل</span>
      </div>
    </div>
    <video id="vid" autoplay playsinline muted></video>
    <div class="vignette"></div>
    <div class="flash" id="flash"></div>
    <div class="scan-box" id="scanBox">
      <div class="sc tl"></div><div class="sc tr"></div>
      <div class="sc bl"></div><div class="sc br"></div>
      <div class="scan-line"></div>
      <div class="box-label" id="lbl_frame">ضع الطلب داخل الإطار</div>
    </div>
    <div class="no-cam" id="noCam">
      <div class="no-cam-icon">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <p id="lbl_camoff">الكاميرا غير مفعّلة</p>
      <button class="start-btn" id="lbl_startcam" onclick="startCam()">تشغيل الكاميرا</button>
    </div>
  </div>

  <canvas id="cv"></canvas>

  <div class="bottom">
    <div class="shutter-ring">
      <button class="shutter" id="shutter" onclick="capture()" disabled>
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#000" stroke-width="2.5">
          <circle cx="12" cy="12" r="4"/>
          <path stroke-linecap="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="overlay" id="adminOverlay" onclick="closeAdmin()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="lbl_settings">إعدادات المشرف</div>
      <div class="sheet-badge">🔒</div>
    </div>
    <div class="sheet-sub" id="lbl_enterpin">أدخل كود الدخول</div>
    <div class="pin-wrap" id="pinWrap">
      <input class="pin-in" id="pinIn" type="password" inputmode="numeric" maxlength="4" placeholder="••••" oninput="checkPin()">
      <div class="pin-err" id="pinErr">❌ كود خاطئ</div>
    </div>
    <div class="settings" id="settingsDiv">
      <div class="field-label" id="lbl_branchcode">رمز المنشأة (4 أرقام)</div>
      <input class="text-in" id="branchIn" type="number" inputmode="numeric"
        placeholder="أدخل رمز المنشأة"
        oninput="if(this.value.length>4)this.value=this.value.slice(0,4)">
      <div class="field-hint" id="branchHint">أدخل الرمز الرباعي المخصص لمنشأتك</div>
      <div class="field-label" id="lbl_pasteurl">الصق الرابط</div>
      <div class="url-row">
        <input class="url-in" id="urlIn" placeholder="https://script.google.com/macros/s/.../exec">
        <button class="save-btn" id="lbl_save" onclick="saveSettings()">حفظ</button>
      </div>
      <div class="field-hint" id="lbl_savehint">يُحفظ على الجهاز دائماً</div>
    </div>
    <button class="close-btn" id="lbl_close" onclick="closeAdmin()">إغلاق</button>
  </div>
</div>

<!-- ANALYZING -->
<div class="analyzing" id="analyzing">
  <div class="spin-ring"></div>
  <div class="an-t" id="lbl_sending">جاري الإرسال...</div>
  <div class="an-s" id="lbl_reading">يقرأ رقم الطلب والمنصة والتاريخ</div>
</div>

<!-- RESULT -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-sheet">
    <div class="r-handle"></div>
    <div class="r-head">
      <span class="r-title" id="lbl_result">نتيجة التحليل</span>
      <span class="r-badge ok" id="rBadge">✓ تم الإرسال</span>
    </div>
    <div class="r-rows" id="rRows"></div>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-circle">
    <svg class="success-check" width="52" height="52" viewBox="0 0 56 56" fill="none">
      <path d="M12 28L24 40L44 18" stroke="#00C853" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="success-txt" id="lbl_sent">تم الإرسال</div>
</div>

<div class="toast" id="toast"></div>
