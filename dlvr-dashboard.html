<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLVR Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* ══ THEME: DARK (default) ══ */
:root,[data-theme="dark"]{
  --g:#00C853;--g2:#69F0AE;--g-dim:rgba(0,200,83,.08);
  --bg:#060608;--card:#0d0d10;--card2:#141418;--border:#1a1a20;
  --text:#e8e8ec;--muted:#6b6b78;--red:#ff3d57;--warn:#ffb300;--blue:#448aff;
  --input-bg:#060608;--sidebar-bg:#0d0d10;
}

/* ══ THEME: LIGHT ══ */
[data-theme="light"]{
  --bg:#f2f3f5;--card:#ffffff;--card2:#f8f8fa;--border:#e0e0e4;
  --text:#1a1a2e;--muted:#7a7a8c;--input-bg:#ffffff;--sidebar-bg:#ffffff;
  --g-dim:rgba(0,200,83,.07);
}
[data-theme="light"] .login-bg{background:radial-gradient(ellipse at 30% 20%,rgba(0,200,83,.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,200,83,.06) 0%,transparent 50%)!important;}
[data-theme="light"] .sb-logo-i svg path,[data-theme="light"] .login-logo svg path{fill:#fff!important;}
[data-theme="light"] .o-num{color:#009624;}
[data-theme="light"] .bc-st-v{color:#009624;}
[data-theme="light"] .st-v.gr{color:#009624;}

/* ══ THEME: BLUE DARK ══ */
[data-theme="blue"]{
  --bg:#0a0e1a;--card:#111827;--card2:#1a2236;--border:#1e2a42;
  --text:#dfe3ec;--muted:#6878a0;--input-bg:#0a0e1a;--sidebar-bg:#111827;
  --g-dim:rgba(0,200,83,.07);
}

html,body{min-height:100vh;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
a{color:var(--g);text-decoration:none;}::selection{background:var(--g);color:#000;}

.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(0,200,83,.06) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,200,83,.04) 0%,transparent 50%);}
.login-card{position:relative;width:100%;max-width:380px;padding:40px 32px;background:var(--card);border:1px solid var(--border);border-radius:20px;text-align:center;animation:fadeIn .6s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo{width:56px;height:56px;margin:0 auto 16px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;}
.login-logo svg{width:32px;height:32px;}
.login-title{font-size:24px;font-weight:900;letter-spacing:4px;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.login-field{width:100%;margin-bottom:12px;}
.login-field input{width:100%;padding:14px 16px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Tajawal';font-size:14px;outline:none;transition:border-color .2s;}
.login-field input:focus{border-color:var(--g);}
.login-field input::placeholder{color:var(--muted);}
.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--g);color:#000;font-family:'Tajawal';font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.login-err{font-size:12px;color:var(--red);margin-top:10px;display:none;}

.dashboard{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;right:0;width:220px;height:100vh;background:var(--sidebar-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:30;transition:transform .3s,background .3s;overflow:hidden;}
.sb-logo{padding:14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.sb-logo-i{width:30px;height:30px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-logo-i svg{width:16px;height:16px;}
.sb-logo-t{font-size:16px;font-weight:900;letter-spacing:3px;}
.sb-user{padding:10px 14px;border-bottom:1px solid var(--border);}
.sb-user-n{font-size:12px;font-weight:700;}.sb-user-r{font-size:10px;color:var(--muted);}
.sb-nav{flex:1;padding:6px;overflow-y:auto;}
.nav-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;padding:8px 10px 4px;font-weight:700;}
.nav-i{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;margin-bottom:1px;}
.nav-i:hover{background:var(--g-dim);color:var(--text);}
.nav-i.on{background:var(--g-dim);color:var(--g);font-weight:700;}
.nav-i svg{width:15px;height:15px;flex-shrink:0;}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nav-i.disabled-brand{opacity:.4;}
.sb-bot{padding:8px;border-top:1px solid var(--border);}
.logout-btn{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Tajawal';font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* Theme switcher */
.theme-switch{display:flex;gap:4px;margin-bottom:6px;}
.theme-btn{flex:1;padding:5px 2px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:'Tajawal';font-size:9px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.theme-btn:hover{border-color:var(--g);color:var(--text);}
.theme-btn.on{border-color:var(--g);color:var(--g);background:var(--g-dim);}

.main{margin-right:220px;padding:18px 22px;min-height:100vh;transition:background .3s;}
/* Search bar - improved */
.search-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.search-row{display:flex;align-items:center;gap:10px;}
.search-wrap{position:relative;flex:1;}
.search-wrap svg{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:22px;height:22px;color:var(--g);pointer-events:none;}
.search-input{width:100%;padding:14px 48px 14px 14px;background:var(--bg);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:'Tajawal';font-size:18px;font-weight:700;outline:none;transition:all .2s;direction:ltr;text-align:right;letter-spacing:.5px;}
.search-input:focus{border-color:var(--g);box-shadow:0 0 24px rgba(0,200,83,.12);}
.search-input::placeholder{color:var(--muted);font-weight:400;font-size:14px;}
.search-count{background:var(--g);color:#000;font-size:12px;font-weight:800;padding:6px 14px;border-radius:8px;white-space:nowrap;}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.st{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden;transition:background .3s,border-color .3s;}
.st::after{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--g);}
.st-l{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-bottom:3px;}
.st-v{font-size:22px;font-weight:900;line-height:1;}.st-v.gr{color:var(--g);}
.st-s{font-size:10px;color:var(--muted);margin-top:2px;}

/* Filters - improved */
.filters-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.flt{padding:8px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal';font-size:12px;font-weight:500;outline:none;cursor:pointer;appearance:auto;transition:border-color .2s;}
.flt:focus{border-color:var(--g);}
.flt-clear{padding:8px 14px;background:transparent;border:1.5px dashed var(--border);border-radius:10px;color:var(--muted);font-family:'Tajawal';font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.flt-clear:hover{border-color:var(--red);color:var(--red);}

/* Orders table - new */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:background .3s,border-color .3s;}
.tbl{width:100%;border-collapse:collapse;}
.tbl thead{background:var(--bg);}
.tbl th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--muted);text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;letter-spacing:.3px;}
.tbl th.c{text-align:center;}
.tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr{transition:background .1s;}
.tbl tbody tr:hover{background:rgba(0,200,83,.04);}
.tbl .td-num{font-size:16px;font-weight:900;color:var(--g);direction:ltr;text-align:left;cursor:pointer;user-select:all;position:relative;white-space:nowrap;}
.tbl .td-num:hover{text-decoration:underline;}
.tbl .td-num .copied{position:absolute;top:-16px;right:0;font-size:9px;color:var(--g);font-weight:600;animation:fadeOut 1s forwards;pointer-events:none;}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0;transform:translateY(-8px)}}
.tbl .td-branch{font-size:13px;font-weight:600;white-space:nowrap;}
.o-platform{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;}
.o-platform.hs{background:rgba(255,90,0,.12);color:#ff5a00;}
.o-platform.keeta{background:rgba(0,200,83,.12);color:var(--g);}
.o-platform.jahez{background:rgba(68,138,255,.12);color:var(--blue);}
.o-platform.toyou{background:rgba(255,179,0,.12);color:var(--warn);}
.o-platform.ninja{background:rgba(156,39,176,.12);color:#9c27b0;}
.o-platform.marsool{background:rgba(244,67,54,.12);color:#f44336;}
.o-platform.other{background:rgba(107,107,120,.1);color:var(--muted);}
.td-date{font-size:12px;color:var(--muted);direction:ltr;text-align:left;white-space:nowrap;}
.td-time{font-size:12px;color:var(--text);font-weight:600;direction:ltr;text-align:left;white-space:nowrap;}
.td-img{width:44px;height:44px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s;}
.td-img:hover{border-color:var(--g);box-shadow:0 0 10px rgba(0,200,83,.15);}
.td-img svg{width:16px;height:16px;color:var(--muted);}
.td-img img{width:100%;height:100%;object-fit:cover;}
.img-actions{display:flex;align-items:center;gap:4px;justify-content:center;}
.dl-btn{width:32px;height:32px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;}
.dl-btn:hover{border-color:var(--g);background:var(--g-dim);}
.dl-btn svg{width:14px;height:14px;color:var(--muted);}
.dl-btn:hover svg{color:var(--g);}
.no-data{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

/* Mobile: cards instead of table */
.mobile-cards{display:none;}
.mobile-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;transition:border-color .15s;}
.mobile-card:hover{border-color:var(--g);}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.mc-num{font-size:18px;font-weight:900;color:var(--g);direction:ltr;cursor:pointer;position:relative;}
.mc-num .copied{position:absolute;top:-16px;right:0;font-size:9px;color:var(--g);font-weight:600;animation:fadeOut 1s forwards;pointer-events:none;}
.mc-img{width:48px;height:48px;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;flex-shrink:0;}
.mc-img img{width:100%;height:100%;object-fit:cover;}
.mc-details{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.mc-d{font-size:11px;color:var(--muted);}.mc-d span{color:var(--text);font-weight:600;}

@media(max-width:768px){
  .tbl-wrap{display:none;}
  .mobile-cards{display:block;}
  .search-row{flex-direction:column;}
  .filters-row{gap:6px;}
  .flt{font-size:11px;padding:6px 10px;}
}

.brands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:18px;}
.brand-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;}
.brand-card:hover{border-color:var(--g);transform:translateY(-2px);}
.brand-card.brand-disabled{opacity:.4;pointer-events:none;}
.brand-card.brand-disabled-admin{opacity:.5;border-style:dashed;}
.brand-card.brand-disabled-admin:hover{opacity:.7;}
.bc-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#000;flex-shrink:0;overflow:hidden;}
.bc-icon img{width:100%;height:100%;object-fit:cover;}
.bc-name{font-size:14px;font-weight:700;}
.bc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.bc-st{background:var(--bg);border-radius:6px;padding:5px;text-align:center;}
.bc-st-v{font-size:15px;font-weight:900;color:var(--g);}
.bc-st-l{font-size:9px;color:var(--muted);}

.sup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px;}
.sup-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color .2s;}
.sup-card:hover{border-color:var(--g);}
.sup-card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sup-num{width:32px;height:32px;border-radius:8px;background:var(--g);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:13px;}
.sup-name{font-size:13px;font-weight:700;}
.sup-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
.sup-st{background:var(--bg);border-radius:6px;padding:5px 6px;text-align:center;}
.sup-st-v{font-size:14px;font-weight:900;color:var(--text);}
.sup-st-l{font-size:8px;color:var(--muted);}
.sup-st-v.gr{color:var(--g);}

.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px;}
.chart-title{font-size:13px;font-weight:700;margin-bottom:10px;}
canvas.perf-chart{width:100%!important;max-height:300px;}

.img-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:10px;}
.img-modal.on{display:flex;}
.img-modal img{max-width:92vw;max-height:80vh;border-radius:10px;}
.img-modal-close{font-size:12px;color:var(--muted);background:var(--card);padding:5px 16px;border-radius:8px;border:1px solid var(--border);}

.loading{display:flex;align-items:center;justify-content:center;padding:50px;gap:10px;}
.ld-spin{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-t{font-size:12px;color:var(--muted);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);padding:8px 20px;border-radius:8px;font-size:12px;font-weight:700;z-index:200;transition:transform .3s;font-family:'Tajawal';background:var(--g);color:#000;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Settings styles */
.sett-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:700px;margin-bottom:14px;transition:background .3s,border-color .3s;}
.sett-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.sett-desc{font-size:11px;color:var(--muted);margin-bottom:14px;}
.sett-input{width:100%;padding:10px 12px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal';font-size:13px;outline:none;direction:ltr;text-align:left;margin-bottom:8px;transition:border-color .2s;}
.sett-input:focus{border-color:var(--g);}
.sett-input.rtl-input{direction:rtl;text-align:right;}
.sett-btn{padding:8px 20px;border:none;border-radius:8px;background:var(--g);color:#000;font-family:'Tajawal';font-size:12px;font-weight:700;cursor:pointer;transition:transform .1s;}
.sett-btn:hover{transform:scale(1.02);}
.sett-btn-o{padding:8px 20px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-family:'Tajawal';font-size:12px;font-weight:600;cursor:pointer;}
.sett-btn-o:hover{border-color:var(--g);}
.save-bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:14px 0;margin-top:18px;display:flex;align-items:center;gap:12px;z-index:10;}
.save-bar .sett-btn{padding:12px 40px;font-size:14px;font-weight:800;border-radius:10px;}
.save-bar .save-status{font-size:12px;color:var(--muted);display:none;}
.save-bar .save-status.show{display:inline;color:var(--g);font-weight:700;}
.sett-tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap;}
.sett-tab{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Tajawal';font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.sett-tab:hover{border-color:var(--g);color:var(--text);}
.sett-tab.on{border-color:var(--g);color:var(--g);background:var(--g-dim);}
.brand-sett-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;flex-wrap:wrap;transition:background .15s;}
.brand-sett-row:hover{background:var(--g-dim);}
.toggle-wrap{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle-wrap input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:22px;cursor:pointer;transition:background .2s;}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;right:3px;transition:transform .2s;}
.toggle-wrap input:checked+.toggle-slider{background:var(--g);}
.toggle-wrap input:checked+.toggle-slider::before{transform:translateX(-18px);}

.menu-btn{display:none;position:fixed;top:10px;right:10px;z-index:40;width:38px;height:38px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;align-items:center;justify-content:center;}
.menu-btn svg{width:18px;height:18px;color:var(--text);}
@media(max-width:768px){.sidebar{transform:translateX(100%);}.sidebar.open{transform:translateX(0);}.main{margin-right:0;padding:12px;}.menu-btn{display:flex;}.stats{grid-template-columns:repeat(2,1fr);}.order-row{flex-wrap:wrap;gap:6px;}.o-spacer{display:none;}.sup-grid{grid-template-columns:1fr 1fr;}.brands-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo"><svg viewBox="0 0 38 38" fill="none"><path d="M24 5L10 20.5H19L13 33L28 17.5H19L24 5Z" fill="#0d0d0d"/></svg></div>
    <div class="login-title">DLVR</div>
    <div class="login-sub">منصة إدارة التوثيق</div>
    <div class="login-field"><input id="loginUser" type="text" placeholder="اسم المستخدم"></div>
    <div class="login-field"><input id="loginPass" type="password" placeholder="كلمة المرور"></div>
    <button class="login-btn" onclick="doLogin()">تسجيل الدخول</button>
    <div class="login-err" id="loginErr">اسم المستخدم أو كلمة المرور غير صحيحة</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <button class="menu-btn" onclick="toggleSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <div class="sidebar" id="sidebar">
    <div class="sb-logo"><div class="sb-logo-i"><svg viewBox="0 0 38 38" fill="none"><path d="M24 5L10 20.5H19L13 33L28 17.5H19L24 5Z" fill="#0d0d0d"/></svg></div><span class="sb-logo-t">DLVR</span></div>
    <div class="sb-user"><div class="sb-user-n" id="sbName">—</div><div class="sb-user-r" id="sbRole">—</div></div>
    <div class="sb-nav" id="sbNav"></div>
    <div class="sb-bot">
      <div class="theme-switch">
        <button class="theme-btn on" data-theme="dark" onclick="setTheme('dark')">داكن</button>
        <button class="theme-btn" data-theme="light" onclick="setTheme('light')">فاتح</button>
        <button class="theme-btn" data-theme="blue" onclick="setTheme('blue')">أزرق</button>
      </div>

function getBrandsConfig(){

}
function saveBrandsConfig(brands){
  localStorage.setItem('dlvr_brands_config',JSON.stringify(brands.map(b=>({id:b.id,name:b.name,color:b.color,sheetId:b.sheetId,scriptUrl:b.scriptUrl,logo:b.logo,branches:b.branches,enabled:b.enabled,deliveryLogos:b.deliveryLogos||{}}))));
}
function getSupervisorsConfig(){
  // Passwords ALWAYS come from code defaults — localStorage only stores label & assignedBrands
  try{
    const s=localStorage.getItem('dlvr_supervisors');
    if(s){
      const saved=JSON.parse(s);
      return DEFAULT_SUPERVISORS.map(d=>{
        const o=saved.find(x=>x.username===d.username);
        if(o)return{...d,label:o.label||d.label,assignedBrands:o.assignedBrands||d.assignedBrands};
        return{...d};
      });
    }
  }catch{}
  return DEFAULT_SUPERVISORS.map(d=>({...d}));
}
function saveSupervisorsConfig(sups){localStorage.setItem('dlvr_supervisors',JSON.stringify(sups));}

function getBrands(){return getBrandsConfig();}
function getVisibleBrands(){
  const all=getBrands();
  if(!currentUser)return[];
  if(currentUser.role==='admin')return all;
  let filtered=all.filter(b=>b.enabled);
  if(currentUser.role==='supervisor'){
    const sups=getSupervisorsConfig();
    const sup=sups.find(s=>s.username===currentUser.username);
    if(sup&&sup.assignedBrands&&sup.assignedBrands!=='all'){
      const assigned=Array.isArray(sup.assignedBrands)?sup.assignedBrands:[];
      if(assigned.length>0)filtered=filtered.filter(b=>assigned.includes(b.id));
    }
  }
  return filtered;
}

// ══ TRACKING ═════════════════════════════════════════
function track(type,details='',brand=''){
  if(!currentUser||currentUser.role!=='supervisor')return;
  if(!TRACKING_URL)return;
  try{fetch(TRACKING_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'log',supervisor:currentUser.username,type,details,brand})});}catch{}
}
function trackSessionEnd(){
  if(!currentUser||currentUser.role!=='supervisor'||!sessionStart||!TRACKING_URL)return;
  const dur=Math.round((Date.now()-sessionStart)/1000);
  try{fetch(TRACKING_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'session_end',supervisor:currentUser.username,duration:dur,startTime:new Date(sessionStart).toLocaleTimeString('en',{hour12:false})})});}catch{}
}

function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();

  const user=users.find(x=>x.username===u&&x.password===p);
  if(!user){document.getElementById('loginErr').style.display='block';setTimeout(()=>document.getElementById('loginErr').style.display='none',3000);return;}
  currentUser=user;sessionStart=Date.now();
  localStorage.setItem('dlvr_user',JSON.stringify({username:user.username}));
  track('login');showDashboard();
}

function navItem(id,label,path,active=false){return `<div class="nav-i${active?' on':''}" onclick="navClick('${id}')" id="${id}"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">${path}</svg>${label}</div>`;}

// ══ LOAD DATA ════════════════════════════════════════
async function loadAllData(){
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="ld-spin"></div><span class="ld-t">جاري تحميل البيانات...</span></div>';
  const brands=getBrands();
  const list=currentUser.role==='brand'?brands.filter(b=>b.id===currentUser.brandId):brands.filter(b=>currentUser.role==='admin'||b.enabled);
  await Promise.all(list.map(async b=>{
    if(!b.sheetId||b.sheetId.startsWith('SHEET_ID')){allData[b.id]=[];return;}
    try{
      const url=`https://docs.google.com/spreadsheets/d/${b.sheetId}/gviz/tq?tqx=out:json&tq=${encodeURIComponent('SELECT * ORDER BY A DESC, B DESC LIMIT 1000')}`;
      const res=await fetch(url);const text=await res.text();
      const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\)/)[1]);
      allData[b.id]=(json.table.rows||[]).map(r=>{const c=r.c||[];
        // Date from gviz comes as "Date(y,m,d)" string — parse it
        let dateStr=c[0]?.f||'';
        if(!dateStr&&c[0]?.v){const dm=String(c[0].v).match(/Date\((\d+),(\d+),(\d+)\)/);if(dm)dateStr=`${dm[1]}-${String(+dm[2]+1).padStart(2,'0')}-${dm[3].padStart(2,'0')}`;}
        let timeStr=c[1]?.f||'';
        if(!timeStr&&c[1]?.v){const tm=String(c[1].v).match(/(\d+),(\d+),(\d+)/);if(tm)timeStr=`${tm[1].padStart(2,'0')}:${tm[2].padStart(2,'0')}:${tm[3].padStart(2,'0')}`;}
        return{date:dateStr,time:timeStr,branch:c[2]?.v!=null?String(c[2].v):(c[2]?.f||''),branchName:c[3]?.v||c[3]?.f||'',order:c[4]?.v!=null?String(c[4].v):(c[4]?.f||''),platform:c[5]?.v||c[5]?.f||'',image:c[9]?.v||c[9]?.f||''};
      }).filter(r=>r.order&&r.order!=='غير واضح');
    }catch(e){console.error(b.id,e);allData[b.id]=[];}
  }));
  if(currentUser.role==='brand')showBrand(currentUser.brandId);else showOverview();
}

// ══ OVERVIEW ═════════════════════════════════════════

  brands.forEach(b=>{const d=allData[b.id]||[];total+=d.length;d.forEach(r=>{if(r.date?.includes(today))todayN++;if(r.branch)branches.add(r.branch);const p=r.platform||'—';plats[p]=(plats[p]||0)+1;});});
  const topP=Object.entries(plats).sort((a,b)=>b[1]-a[1])[0];
  const enabledCount=brands.filter(b=>b.enabled).length;
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;">
    <div style="font-size:20px;font-weight:900;">نظرة عامة</div><div style="font-size:11px;color:var(--muted);background:var(--card);padding:5px 12px;border-radius:6px;border:1px solid var(--border)">${today}</div></div>
    <div class="stats">
      <div class="st"><div class="st-l">إجمالي الطلبات</div><div class="st-v gr">${total.toLocaleString()}</div></div>
      <div class="st"><div class="st-l">اليوم</div><div class="st-v">${todayN}</div></div>
      <div class="st"><div class="st-l">البراندات المفعّلة</div><div class="st-v">${enabledCount}</div></div>
      <div class="st"><div class="st-l">الفروع</div><div class="st-v">${branches.size}</div></div>
      <div class="st"><div class="st-l">أكثر منصة</div><div class="st-v" style="font-size:14px">${topP?topP[0]:'—'}</div></div>
    </div><div class="brands-grid">`;
  brands.forEach(b=>{
    const d=allData[b.id]||[];const td=d.filter(r=>r.date?.includes(today)).length;const br=new Set(d.map(r=>r.branch).filter(Boolean));
    const disClass=!b.enabled?(currentUser.role==='admin'?' brand-disabled-admin':' brand-disabled'):'';
    const logoHtml=b.logo?`<img src="${b.logo}" alt="${b.name}">`:`${b.name.charAt(0)}`;
    h+=`<div class="brand-card${disClass}" onclick="showBrand('${b.id}')"><div class="bc-head"><div class="bc-icon" style="background:${b.color}">${logoHtml}</div><div class="bc-name">${b.name}${!b.enabled&&currentUser.role==='admin'?' <span style="font-size:10px;color:var(--muted)">(معطّل)</span>':''}</div></div>
    <div class="bc-stats"><div class="bc-st"><div class="bc-st-v">${d.length}</div><div class="bc-st-l">إجمالي</div></div><div class="bc-st"><div class="bc-st-v">${td}</div><div class="bc-st-l">اليوم</div></div><div class="bc-st"><div class="bc-st-v">${br.size}</div><div class="bc-st-l">فروع</div></div></div></div>`;
  });
  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
}

function clearFilters(){
  const s=document.getElementById('searchInput'),b=document.getElementById('fBranch'),p=document.getElementById('fPlatform'),d=document.getElementById('fDate');
  if(s)s.value='';if(b)b.value='';if(p)p.value='';if(d)d.value='';
  doFilter();
}

function doFilter(){
  const data=allData[selectedBrand]||[];
  const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  const fb=document.getElementById('fBranch')?.value||'';
  const fp=document.getElementById('fPlatform')?.value||'';
  const fd=document.getElementById('fDate')?.value||'';
  if(q)track('search',q,selectedBrand);
  const f=data.filter(r=>{
    if(q&&!(r.order||'').toLowerCase().includes(q)&&!(r.branchName||'').toLowerCase().includes(q)&&!(r.branch||'').toLowerCase().includes(q))return false;
    if(fb&&(r.branchName||r.branch)!==fb)return false;if(fp&&r.platform!==fp)return false;if(fd&&!r.date?.includes(fd))return false;return true;});
  renderOrders(f);
}

// ══ PERFORMANCE PAGE (Admin only) ════════════════════
async function showPerformance(){
  setNav('nav-perf');selectedBrand=null;
  const main=document.getElementById('mainContent');
  main.innerHTML='<div class="loading"><div class="ld-spin"></div><span class="ld-t">جاري تحميل بيانات الأداء...</span></div>';
  const today=new Date().toISOString().split('T')[0];
  const month=today.slice(0,7);
  let dailyData=[],monthlyData=[];
  if(TRACKING_URL){
    try{
      const [dRes,mRes]=await Promise.all([
        fetch(TRACKING_URL+'?action=daily&date='+today).then(r=>r.json()).catch(()=>[]),
        fetch(TRACKING_URL+'?action=monthly&month='+month).then(r=>r.json()).catch(()=>[])
      ]);
      dailyData=Array.isArray(dRes)?dRes:[];
      monthlyData=Array.isArray(mRes)?mRes:[];
    }catch{dailyData=[];monthlyData=[];}
  }
  const supsConfig=getSupervisorsConfig();
  const sups=supsConfig.map(s=>s.username);
  const dailyMap={};dailyData.forEach(d=>{dailyMap[d.supervisor]=d;});
  const monthMap={};monthlyData.forEach(d=>{monthMap[d.supervisor]=d;});
  let totalSearches=0,totalImages=0,totalCopies=0,totalMinutes=0;
  monthlyData.forEach(d=>{totalSearches+=d.searches;totalImages+=d.images;totalCopies+=d.copies;totalMinutes+=d.minutes;});

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;">
    <div style="font-size:20px;font-weight:900;">أداء المشرفين</div>
    <div style="font-size:11px;color:var(--muted);background:var(--card);padding:5px 12px;border-radius:6px;border:1px solid var(--border)">${month}</div></div>
    <div class="stats">
      <div class="st"><div class="st-l">إجمالي البحث (الشهر)</div><div class="st-v gr">${totalSearches}</div></div>
      <div class="st"><div class="st-l">صور مفتوحة</div><div class="st-v">${totalImages}</div></div>
      <div class="st"><div class="st-l">أرقام منسوخة</div><div class="st-v">${totalCopies}</div></div>
      <div class="st"><div class="st-l">ساعات العمل</div><div class="st-v">${Math.round(totalMinutes/60)}</div></div>
    </div>
    <div class="chart-wrap"><div class="chart-title">أداء المشرفين — الشهر الحالي</div><canvas id="perfChartCanvas" class="perf-chart"></canvas></div>
    <div style="font-size:15px;font-weight:700;margin-bottom:12px;">اليوم — ${today}</div>
    <div class="sup-grid">`;

  supsConfig.forEach((s,i)=>{
    const d=dailyMap[s.username]||{searches:0,images:0,copies:0,minutes:0,total:0};
    const m=monthMap[s.username]||{searches:0,images:0,copies:0,minutes:0,total:0};
    h+=`<div class="sup-card">
      <div class="sup-card-head"><div class="sup-num">${i+1}</div><div class="sup-name">${s.label}</div></div>
      <div class="sup-stats">
        <div class="sup-st"><div class="sup-st-v gr">${d.total}</div><div class="sup-st-l">حركات اليوم</div></div>
        <div class="sup-st"><div class="sup-st-v">${d.minutes||0} د</div><div class="sup-st-l">وقت اليوم</div></div>
        <div class="sup-st"><div class="sup-st-v">${d.searches}</div><div class="sup-st-l">بحث</div></div>
        <div class="sup-st"><div class="sup-st-v">${d.images}</div><div class="sup-st-l">صور</div></div>
        <div class="sup-st"><div class="sup-st-v">${d.copies}</div><div class="sup-st-l">نسخ</div></div>
        <div class="sup-st"><div class="sup-st-v">${m.total}</div><div class="sup-st-l">الشهر</div></div>
      </div></div>`;
  });
  h+='</div>';
  main.innerHTML=h;

  const ctx=document.getElementById('perfChartCanvas');
  if(ctx&&monthlyData.length){
    if(perfChart)perfChart.destroy();
    const labels=supsConfig.map(s=>s.label);
    const searchData=sups.map(s=>(monthMap[s]||{}).searches||0);
    const imageData=sups.map(s=>(monthMap[s]||{}).images||0);
    const copyData=sups.map(s=>(monthMap[s]||{}).copies||0);
    perfChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[
      {label:'بحث',data:searchData,backgroundColor:'rgba(0,200,83,.7)'},
      {label:'صور',data:imageData,backgroundColor:'rgba(68,138,255,.7)'},
      {label:'نسخ',data:copyData,backgroundColor:'rgba(255,179,0,.7)'},
    ]},options:{responsive:true,plugins:{legend:{labels:{color:'#6b6b78',font:{family:'Tajawal'}}}},scales:{x:{ticks:{color:'#6b6b78',font:{family:'Tajawal'}}},y:{ticks:{color:'#6b6b78'},grid:{color:'rgba(255,255,255,.05)'}}}}});
  }
}

  const url=document.getElementById('trackingUrlInput').value.trim();
  if(url&&!url.startsWith('https://script.google.com')){toast('الرابط غير صحيح');return;}
  TRACKING_URL=url;
  localStorage.setItem('dlvr_tracking_url',url);
  toast(url?'تم حفظ الرابط':'تم مسح الرابط');
  renderSettings();
}

async function testTrackingUrl(){
  const url=document.getElementById('trackingUrlInput').value.trim();
  const result=document.getElementById('trackingTestResult');
  if(!url){result.style.display='block';result.style.color='var(--warn)';result.textContent='أدخل الرابط أولاً';return;}
  result.style.display='block';result.style.color='var(--muted)';result.textContent='جاري الاختبار...';
  try{
    const res=await fetch(url+'?action=daily&date=2000-01-01');
    if(res.ok){result.style.color='var(--g)';result.textContent='الاتصال ناجح!';}
    else{result.style.color='var(--red)';result.textContent='خطأ: '+res.status;}
  }catch(e){result.style.color='var(--red)';result.textContent='تعذّر الاتصال — تأكد من الرابط';}
}

// ── Brands save ──
function saveBrandsSettings(){
  const brands=getBrands();
  document.querySelectorAll('[data-brand][data-field]').forEach(el=>{
    const bid=el.dataset.brand,field=el.dataset.field,b=brands.find(x=>x.id===bid);
    if(!b)return;
    if(field==='brname'){const i=+el.dataset.branchidx;if(b.branches&&b.branches[i])b.branches[i].name=el.value;}
    else if(field==='brcode'){const i=+el.dataset.branchidx;if(b.branches&&b.branches[i])b.branches[i].code=el.value;}
    else if(field==='dlogo'){const app=el.dataset.app;if(!b.deliveryLogos)b.deliveryLogos={};b.deliveryLogos[app]=el.value;}
    else{b[field]=el.value;}
  });
  saveBrandsConfig(brands);buildNav();
  showSaveStatus('brandsSaveStatus');
}

function addBranch(brandId){
  // Save current state first then add branch
  saveBrandsSettings();
  const brands=getBrands();const b=brands.find(x=>x.id===brandId);
  if(b){if(!b.branches)b.branches=[];b.branches.push({name:'',code:''});saveBrandsConfig(brands);renderSettings();}
}

function removeBranch(brandId,idx){
  saveBrandsSettings();
  const brands=getBrands();const b=brands.find(x=>x.id===brandId);
  if(b&&b.branches){b.branches.splice(idx,1);saveBrandsConfig(brands);renderSettings();}
}

// ── Supervisors save ──
function saveSupSettings(){
  const sups=getSupervisorsConfig();
  document.querySelectorAll('[data-sup][data-field]').forEach(el=>{
    const i=+el.dataset.sup,field=el.dataset.field;
    if(sups[i])sups[i][field]=el.value;
  });
  // Collect brand assignments
  sups.forEach((s,i)=>{
    const allCheck=document.querySelector(`#sup-brands-${i}`)?.parentElement?.querySelector('input[type=checkbox]');
    if(allCheck&&allCheck.checked){s.assignedBrands='all';}
    else{
      const checks=document.querySelectorAll(`#sup-brands-${i} input[type=checkbox]`);
      const assigned=[];checks.forEach(c=>{if(c.checked)assigned.push(c.value);});
      s.assignedBrands=assigned;
    }
  });
  saveSupervisorsConfig(sups);buildNav();
  showSaveStatus('supSaveStatus');
}

function toggleSupAllBrands(idx,isAll){
  const container=document.getElementById('sup-brands-'+idx);
  if(container){container.querySelectorAll('input[type=checkbox]').forEach(c=>{c.checked=isAll;c.disabled=isAll;});}
}

function toggleSupBrand(idx,brandId,checked){/* UI only — saved on button click */}

// ── Toggle save ──
function saveToggleSettings(){
  const brands=getBrands();
  document.querySelectorAll('[data-toggle-brand]').forEach(el=>{
    const b=brands.find(x=>x.id===el.dataset.toggleBrand);
    if(b)b.enabled=el.checked;
  });
  saveBrandsConfig(brands);buildNav();
  showSaveStatus('toggleSaveStatus');
}

function showSaveStatus(id){
  toast('تم الحفظ بنجاح');
  const el=document.getElementById(id);
  if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
}

// ══ ACTIONS WITH TRACKING ════════════════════════════
function copyNum(el,num){
  track('copy_order',num,selectedBrand);
  navigator.clipboard.writeText(num).then(()=>{
    const tip=document.createElement('span');tip.className='copied';tip.textContent='✓';el.appendChild(tip);setTimeout(()=>tip.remove(),1000);toast('تم نسخ '+num);
  }).catch(()=>{const ta=document.createElement('textarea');ta.value=num;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('تم نسخ '+num);});
}

function downloadImg(url,orderNum){
  track('download_image',orderNum+' | '+url,selectedBrand);
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m){
    const dlUrl=`https://drive.google.com/uc?export=download&id=${m[1]}`;
    const a=document.createElement('a');a.href=dlUrl;a.target='_blank';a.download='order_'+orderNum+'.jpg';
    document.body.appendChild(a);a.click();a.remove();
    toast('جاري تحميل صورة الطلب '+orderNum);
  }else{window.open(url,'_blank');}
}

function openImg(url){
  track('view_image',url,selectedBrand);
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m){document.getElementById('imgModalSrc').src=`https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;document.getElementById('imgModal').classList.add('on');}
  else window.open(url,'_blank');
}

function getDriveThumb(url){const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?`https://drive.google.com/thumbnail?id=${m[1]}&sz=w80`:'';}

// ══ HELPERS ══════════════════════════════════════════
function platClass(p){if(!p)return'other';const l=p.toLowerCase();if(l.includes('hunger'))return'hs';if(l.includes('keeta'))return'keeta';if(l.includes('jahez'))return'jahez';if(l.includes('toyou'))return'toyou';if(l.includes('ninja'))return'ninja';if(l.includes('marsool')||l.includes('مرسول'))return'marsool';return'other';}
function getPlatLogo(p){
  if(!p)return'';const l=p.toLowerCase();
  // Check brand-specific logos first
  if(selectedBrand){const br=getBrands().find(b=>b.id===selectedBrand);if(br&&br.deliveryLogos){for(const[app,url]of Object.entries(br.deliveryLogos)){if(url&&l.includes(app.toLowerCase()))return url;}}}
  // Default logos
  for(const[key,url]of Object.entries(PLATFORM_LOGOS)){if(l.includes(key))return url;}
  return'';
}
function platBadge(p){
  const cls=platClass(p);const logo=getPlatLogo(p);const name=p||'—';
  if(logo)return`<span class="o-platform ${cls}" style="display:inline-flex;align-items:center;gap:5px;"><img src="${logo}" style="width:16px;height:16px;border-radius:3px;" onerror="this.style.display='none'">${name}</span>`;
  return`<span class="o-platform ${cls}">${name}</span>`;
}
function setNav(id){document.querySelectorAll('.nav-i').forEach(n=>n.classList.remove('on'));const e=document.getElementById(id);if(e)e.classList.add('on');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.className='toast show';setTimeout(()=>e.classList.remove('show'),2000);}
document.getElementById('loginPass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('loginUser')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});
document.addEventListener('click',e=>{if(e.target.closest('.nav-i')&&innerWidth<=768)document.getElementById('sidebar').classList.remove('open');});
</script>
